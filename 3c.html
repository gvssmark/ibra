<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IBRA Membership Form</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: powderblue; padding: 6px; min-height: 100vh; }
        
        /* Mobile Only Guard */
        #mobile-guard { display: none; position: fixed; inset: 0; background: white; z-index: 9999; padding: 40px; text-align: center; }
        @media (min-width: 1024px) { #mobile-guard { display: block; } }

        .header { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 12px; text-align: center; background: rgba(255,255,255,0.9); border-bottom: 1px solid #ddd; }
        .container { max-width: 520px; margin: 80px auto 20px; background: ghostwhite; border-radius: 8px; padding: 15px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }

        label { font-size: small; display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 2px solid #dee2e6; border-radius: 6px; font-size: 16px; background: #fff; }

        .date-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .dob-color { background:#fff3cd !important; } .doj-color { background:#d1ecf1 !important; } .dor-color { background:#d4edda !important; }

        /* Photo & Sig UI */
        .upload-box { height: 140px; border: 2px dashed #ccc; border-radius: 6px; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        #photo-preview, #sig-preview { max-height: 100%; max-width: 100%; display: none; }

        /* Full Screen Modals */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2001; display: none; flex-direction: column; }
        .modal-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; }
        #canvas { flex: 1; background: #fff; touch-action: none; }
        #camera-video { flex: 1; background: #000; object-fit: cover; }

        .btn { padding:14px; border-radius:6px; cursor:pointer; font-weight:bold; width: 100%; margin-top: 10px; border: none; }
        .btn-submit { background:#007bff; color:#fff; font-size: 18px; }
        .btn-whatsapp { background:#25D366; color:#fff; }
        .btn-capture { background: red; color: white; border-radius: 50%; width: 60px; height: 60px; margin: 10px auto; }
    </style>
</head>
<body>

<div id="mobile-guard">
    <h2>Access Denied</h2>
    <p>This application is optimized for Mobile Devices only. Please open this link on your smartphone.</p>
</div>

<div class="header"><h2 style="color:red">IBRA Membership Form</h2></div>

<div class="container">
    <form id="pensionForm">
        <label>Passport Photo *</label>
        <div class="upload-box" onclick="openCamera()">
            <span id="photo-prompt">Tap to Capture Photo</span>
            <img id="photo-preview">
        </div>

        <label>Name *</label><input id="pensionerName" required>
        <label>SR No / Employee ID *</label><input id="empId" type="number" required>

        <label>Dates: <span class="dob-color">Birth</span> | <span class="doj-color">Join</span> | <span class="dor-color">Retire</span></label>
        <div class="date-group">
            <input type="date" id="dob" class="dob-color" required onchange="recalcFromDOB()">
            <input type="date" id="doj" class="doj-color" required>
            <input type="date" id="dor" class="dor-color" required>
        </div>

        <h3 style="margin-top:20px; font-size:14px;">Address Details</h3>
        <label>House No *</label><input id="hno" required>
        <label>Area / Landmark</label><input id="area">
        <label>Colony / Locality</label><input id="colony">
        <label>City *</label><input id="city" required>
        <label>District *</label><input id="dist" required>
        <label>PIN *</label><input id="pin" type="number" required>
        <label>State *</label>
        <select id="state" required><option value="">Select State</option><option value="Andhra Pradesh">Andhra Pradesh</option><option value="Telangāna">Telangāna</option><option value="Tamil Nādu">Tamil Nādu</option><option value="Karnataka">Karnataka</option><option value="Kerala">Kerala</option></select>

        <label>Mobile 1 *</label><input id="mob1" type="tel" required maxlength="10">
        <label>Email *</label><input id="email" type="email" required>
        <label>Pension Branch *</label><input id="branch" required>

        <label>Signature (Rotate phone for wide signature) *</label>
        <div class="upload-box" onclick="openSig()">
            <span id="sig-prompt">Tap to Sign</span>
            <img id="sig-preview">
        </div>

        <button type="button" class="btn btn-whatsapp" onclick="sendToWhatsApp()">📱 Send to WhatsApp</button>
        <button type="submit" class="btn btn-submit">💾 Generate PDF</button>
    </form>
</div>

<div id="sig-modal" class="modal">
    <div class="modal-header">
        <button type="button" onclick="closeModal('sig-modal')">Cancel</button>
        <button type="button" onclick="clearCanvas()" style="color:red">Clear</button>
        <button type="button" onclick="saveSignature()" style="background:#007bff; color:white; padding:5px 15px; border-radius:4px;">Done</button>
    </div>
    <canvas id="canvas"></canvas>
</div>

<div id="camera-modal" class="modal">
    <div class="modal-header">
        <button type="button" onclick="stopCamera()">Cancel</button>
        <span style="font-weight:bold">Passport Photo</span>
        <div style="width:50px"></div>
    </div>
    <video id="camera-video" autoplay playsinline></video>
    <button type="button" class="btn-capture" onclick="takePhoto()"></button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const canvas = $("canvas"), ctx = canvas.getContext("2d");
let drawing = false, hasSig = false, hasPhoto = false;

// 1. DATE LOGIC & PRE-POPULATION
function formatDate(date) { return date.toISOString().split('T')[0]; }
function recalcFromDOB() {
    if (!$("dob").value) return;
    const b = new Date($("dob").value);
    $("doj").value = formatDate(new Date(b.getFullYear() + 24, b.getMonth(), b.getDate()));
    // Last day of month logic for retirement
    const rDate = new Date(b.getFullYear() + 60, b.getMonth() + 1, 0);
    $("dor").value = formatDate(rDate);
}

// 2. CAMERA LOGIC
async function openCamera() {
    $("camera-modal").style.display = "flex";
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
    $("camera-video").srcObject = stream;
}
function stopCamera() {
    const stream = $("camera-video").srcObject;
    if (stream) stream.getTracks().forEach(t => t.stop());
    $("camera-modal").style.display = "none";
}
function takePhoto() {
    const v = $("camera-video");
    const tmpCanvas = document.createElement("canvas");
    tmpCanvas.width = 300; tmpCanvas.height = 400; // Passport aspect ratio
    tmpCanvas.getContext("2d").drawImage(v, 0, 0, 300, 400);
    $("photo-preview").src = tmpCanvas.toDataURL("image/jpeg");
    $("photo-preview").style.display = "block";
    $("photo-prompt").style.display = "none";
    hasPhoto = true;
    stopCamera();
}

// 3. SIGNATURE LOGIC (FIXED STRETCHING)
function openSig() {
    $("sig-modal").style.display = "flex";
    setTimeout(resizeCanvas, 100);
}
function resizeCanvas() {
    const ratio = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2; ctx.strokeStyle = "#000";
}
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}
canvas.addEventListener("touchstart", (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); });
canvas.addEventListener("touchmove", (e) => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
canvas.addEventListener("touchend", () => drawing = false);

function saveSignature() {
    $("sig-preview").src = canvas.toDataURL();
    $("sig-preview").style.display = "block";
    $("sig-prompt").style.display = "none";
    hasSig = true;
    $("sig-modal").style.display = "none";
}
function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }
function closeModal(id) { $(id).style.display = "none"; }

// 4. PDF & WHATSAPP
$("pensionForm").onsubmit = (e) => {
    e.preventDefault();
    if (!hasPhoto || !hasSig) return alert("Photo and Signature required!");

    const doc = new jsPDF();
    const d = new Date().toLocaleDateString();
    
    // Header
    doc.setFontSize(18); doc.setTextColor(255, 0, 0);
    doc.text("IBRA MEMBERSHIP FORM", 105, 20, {align:"center"});
    
    // Passport Photo (Top Right)
    doc.addImage($("photo-preview").src, 'JPEG', 160, 30, 35, 45);
    
    doc.setFontSize(10); doc.setTextColor(0,0,0);
    doc.text(`Submission Date: ${d}`, 20, 30);
    
    const cert = `To, The General Secretary, Indian Bank Retirees’ Association (AP & TS). I wish to enrol... [Full Text Included]`;
    doc.text(doc.splitTextToSize(cert, 135), 20, 45);

    let y = 90; doc.setFontSize(11);
    const fields = [
        ["Name", $("pensionerName").value], ["SR No", $("empId").value], 
        ["DOB", $("dob").value], ["DOJ", $("doj").value], ["DOR", $("dor").value],
        ["Address", `${$("hno").value}, ${$("area").value}, ${$("city").value}, ${$("dist").value}, ${$("state").value} - ${$("pin").value}`],
        ["Mobile", $("mob1").value], ["Email", $("email").value], ["Branch", $("branch").value]
    ];

    fields.forEach(([l, v]) => { doc.text(`${l}: ${v}`, 20, y); y += 8; });
    
    doc.text("Signature:", 20, y + 10);
    doc.addImage($("sig-preview").src, 'PNG', 50, y + 5, 60, 20);
    doc.save(`IBRA_${$("empId").value}.pdf`);
};

function sendToWhatsApp() {
    const msg = `*IBRA Membership Submission*\nName: ${$("pensionerName").value}\nID: ${$("empId").value}\nMobile: ${$("mob1").value}\nCity: ${$("city").value}`;
    window.open(`https://wa.me/919989036183?text=${encodeURIComponent(msg)}`, "_blank");
}

document.addEventListener("DOMContentLoaded", () => {
    const today = new Date();
    $("dob").value = formatDate(new Date(today.getFullYear() - 60, today.getMonth(), today.getDate()));
    recalcFromDOB();
});
</script>
</body>
</html>
