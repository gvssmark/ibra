<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IBRA Membership Form</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: powderblue; padding: 6px; min-height: 100vh; overflow-x: hidden; }
        
        .header { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            padding: 12px 3px; text-align: center;
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .container { 
            max-width: 520px; margin: 80px auto 20px; 
            background: ghostwhite; border: 1px solid #dee2e6; border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1); padding: 15px;
        }

        label { font-size: small; display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-weight: 600; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #dee2e6; border-radius: 6px; font-size: 16px; background: #fff; color: #000; }

        .date-group { display: flex; flex-direction: column; gap: 10px; }
        @media(min-width: 480px) { .date-group { display: grid; grid-template-columns: repeat(3, 1fr); } }

        .dob-color { background:#fff3cd !important; } 
        .doj-color { background:#d1ecf1 !important; } 
        .dor-color { background:#d4edda !important; }

        .error { color: #dc3545; font-size: 13px; display: none; margin-top: 5px; font-weight: bold; }
        .success { color: #28a745; font-size: 13px; display: block; margin-top: 5px; }

        .sig-trigger {
            height: 120px; border: 2px dashed #ccc; border-radius: 6px;
            background: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; margin-bottom: 10px;
        }
        #sig-preview { max-height: 100%; max-width: 100%; display: none; }

        #sig-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 2001; display: none; flex-direction: column;
            touch-action: none;
        }
        .sig-header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: #f8f9fa; border-bottom: 1px solid #ddd;
        }
        #canvas { flex: 1; width: 100%; height: 100%; background: #fff; touch-action: none; cursor: crosshair; }

        .btn { padding:12px 20px; border-radius:6px; cursor:pointer; font-weight:600; border:1px solid #dee2e6; width: 100%; margin-top: 10px; }
        .btn-submit { background:#007bff; color:#fff; border-color:#007bff; font-size: 18px; }
        .btn-whatsapp { background:#25D366; color:#fff; border-color:#25D366; }
        .btn-clear { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="header"><h2 style="margin:0;font-size:24px;color:red">IBRA Membership Form</h2></div>

<div class="container">
    <form id="pensionForm">
        <label>Name *</label>
        <input id="pensionerName" required>

        <label>SR No / Employee ID * <span class="error" id="empIdError"></span></label>
        <input id="empId" type="number" min="1" required inputmode="numeric">

        <label>Dates of <span class="dob-color">Birth</span>, <span class="doj-color">Joining</span>, <span class="dor-color">Retirement*</span></label>
        <div class="date-group">
            <input type="date" id="dob" class="dob-color" required>
            <input type="date" id="doj" class="doj-color" required>
            <input type="date" id="dor" class="dor-color" required>
        </div>
        <div class="error" id="dateError"></div>
        <div class="success" id="dateSuccess">✓ DOB (50-100yrs) → DOJ(18-30yrs) DOR(50-60yrs, last day)</div>

        <h3 style="margin-top:20px; border-bottom:1px solid #ccc; padding-bottom:5px;">Address Details</h3>
        <label>Flat No & Apts Name / House No *</label>
        <input id="addr_hno" required>
        
        <label>Area / Land Mark</label>
        <input id="addr_landmark">
        
        <label>Colony / Locality</label>
        <input id="addr_colony">
        
        <label>City / Town / Village *</label>
        <input id="addr_city" required>
        
        <label>District *</label>
        <input id="addr_district" required>
        
        <label>PIN Code *</label>
        <input id="addr_pin" type="number" required maxlength="6">
        
        <label>State *</label>
        <select id="addr_state" required>
            <option value="">Select State</option>
            <option value="AN">Andaman and Nicobar Islands</option>
            <option value="AP">Andhra Pradesh</option>
            <option value="AR">Arunāchal Pradesh</option>
            <option value="AS">Assam</option>
            <option value="BR">Bihār</option>
            <option value="CH">Chandigarh</option>
            <option value="CG">Chhattīsgarh</option>
            <option value="DH">Dādra and Nagar Haveli and Damān and Diu</option>
            <option value="DL">Delhi</option>
            <option value="GA">Goa</option>
            <option value="GJ">Gujarāt</option>
            <option value="HR">Haryāna</option>
            <option value="HP">Himāchal Pradesh</option>
            <option value="JK">Jammu and Kashmīr</option>
            <option value="JH">Jhārkhand</option>
            <option value="KA">Karnātaka</option>
            <option value="KL">Kerala</option>
            <option value="LA">Ladākh</option>
            <option value="LD">Lakshadweep</option>
            <option value="MP">Madhya Pradesh</option>
            <option value="MH">Mahārāshtra</option>
            <option value="MN">Manipur</option>
            <option value="ML">Meghālaya</option>
            <option value="MZ">Mizoram</option>
            <option value="NL">Nāgāland</option>
            <option value="OD">Odisha</option>
            <option value="PY">Puducherry (Pondicherry)</option>
            <option value="PB">Punjab</option>
            <option value="RJ">Rājasthān</option>
            <option value="SK">Sikkim</option>
            <option value="TN">Tamil Nādu</option>
            <option value="TS">Telangāna</option>
            <option value="TR">Tripura</option>
            <option value="UP">Uttar Pradesh</option>
            <option value="UK">Uttarākhand</option>
            <option value="WB">West Bengal</option>
        </select>

        <label>Mobile 1 *</label>
        <input id="mobile1" type="tel" required maxlength="10">

        <label>Mobile 2</label>
        <input id="mobile2" type="tel" maxlength="10">

        <label>Email *</label>
        <input type="email" id="email" required>

        <label>Pension Branch *</label>
        <input id="branch" required>

        <label>Spouse Name</label>
        <input id="spouse">

        <label>Signature (Tap to sign) *</label>
        <div class="sig-trigger" onclick="openModal()">
            <span id="sig-placeholder">Tap to sign electronically</span>
            <img id="sig-preview">
        </div>

        <button type="button" class="btn btn-whatsapp" onclick="sendToWhatsApp()">📱 Send to WhatsApp</button>
        <button type="submit" class="btn btn-submit">💾 Generate PDF</button>
    </form>
</div>

<div id="sig-modal">
    <div class="sig-header">
        <button type="button" onclick="closeModal()" style="border:none; background:none; color:#666; font-weight:bold;">Cancel</button>
        <button type="button" class="btn-clear" onclick="clearCanvas()">Clear</button>
        <button type="button" onclick="saveSignature()" style="background:#007bff; color:white; border:none; padding:8px 20px; border-radius:4px; font-weight:bold;">Done</button>
    </div>
    <canvas id="canvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const dob = $("dob"), doj = $("doj"), dor = $("dor");
const canvas = $("canvas"), ctx = canvas.getContext("2d");
let drawing = false, hasSignature = false;

// DATE LOGIC
function parseInputDate(value){ const [y,m,d] = value.split("-").map(Number); return new Date(y, m-1, d); }
function formatDate(date){ const y = date.getFullYear(), m = String(date.getMonth()+1).padStart(2,"0"), d = String(date.getDate()).padStart(2,"0"); return `${y}-${m}-${d}`; }
function addYears(date, years){ return new Date(date.getFullYear()+years, date.getMonth(), date.getDate()); }

function setDOBLimits(){
    const today = new Date();
    dob.max = formatDate(new Date(today.getFullYear()-50, today.getMonth(), today.getDate()));
    dob.min = formatDate(new Date(today.getFullYear()-100, today.getMonth(), today.getDate()));
}

function getMaxDOR(birthDate){
    const sixty = addYears(birthDate,60);
    return (birthDate.getDate() === 1) ? new Date(sixty.getFullYear(), sixty.getMonth(), 0) : new Date(sixty.getFullYear(), sixty.getMonth()+1, 0);
}
function clampDate(date,min,max){ return (date < min) ? min : (date > max) ? max : date; }

function recalcFromDOB(){
    if(!dob.value) return;
    const b = parseInputDate(dob.value);
    const minDOJ = addYears(b,18), maxDOJ = addYears(b,30);
    doj.value = formatDate(clampDate(addYears(b,24), minDOJ, maxDOJ));
    dor.value = formatDate(getMaxDOR(b));
    validateDates();
}

function validateDates(){
    if(!dob.value || !doj.value || !dor.value) return false;
    const b = parseInputDate(dob.value), j = parseInputDate(doj.value), r = parseInputDate(dor.value);
    const minDOJ = addYears(b,18), maxDOJ = addYears(b,30), minDOR = addYears(b,50), maxDOR = getMaxDOR(b);
    let err="";
    if(j < minDOJ || j > maxDOJ) err="❌ DOJ must be 18–30 years from DOB.";
    else if(r < minDOR || r > maxDOR) err="❌ DOR must be 50–60 years from DOB.";
    else if(!(b<j && j<r)) err="❌ Must follow DOB < DOJ < DOR.";
    $("dateError").textContent = err;
    $("dateError").style.display = err ? "block" : "none";
    $("dateSuccess").style.display = err ? "none" : "block";
    return !err;
}

// SIGNATURE LOGIC
function openModal() {
    $("sig-modal").style.display = "flex";
    setTimeout(resizeCanvas, 50);
}
function closeModal() { $("sig-modal").style.display = "none"; }
function resizeCanvas() {
    const ratio = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 1.5;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000";
}
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}
function startDrawing(e) { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); if(e.cancelable) e.preventDefault(); }
function draw(e) { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.cancelable) e.preventDefault(); }
canvas.addEventListener("touchstart", startDrawing, {passive: false});
canvas.addEventListener("touchmove", draw, {passive: false});
canvas.addEventListener("touchend", () => drawing = false);
canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
window.addEventListener("mouseup", () => drawing = false);
function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); hasSignature = false; }
function saveSignature() {
    $("sig-preview").src = canvas.toDataURL();
    $("sig-preview").style.display = "block";
    $("sig-placeholder").style.display = "none";
    hasSignature = true;
    closeModal();
}

// DATA & SUBMISSION
function getFullAddress() {
    const fields = [
        $("addr_hno").value,
        $("addr_landmark").value,
        $("addr_colony").value,
        $("addr_city").value,
        $("addr_district").value,
        $("addr_pin").value,
        $("addr_state").value
    ];
    return fields.filter(f => f).join(", ");
}

function getData(){
    return {
        name:$("pensionerName").value, empId:$("empId").value,
        dob:dob.value, doj:doj.value, dor:dor.value,
        address: getFullAddress(),
        mobile1:$("mobile1").value, mobile2:$("mobile2").value,
        email:$("email").value, branch:$("branch").value, spouse:$("spouse").value
    };
}

$("pensionForm").onsubmit = (e) => {
    e.preventDefault();
    const d = getData();
    if(!d.name || !validateDates() || !hasSignature) return alert("Please complete form and sign.");
    const doc = new jsPDF();
    doc.setFontSize(18); doc.text("IBRA MEMBERSHIP FORM",105,20,{align:"center"});
    doc.setFontSize(10);
    const cert = `To, The General Secretary, Indian Bank Retirees’ Association (AP & TS)... [Rest of cert text]`;
    doc.text(doc.splitTextToSize(cert, 170), 20, 35);
    let y = 80; doc.setFontSize(12);
    const fields = [["Name", d.name], ["Emp ID", d.empId], ["DOB", d.dob], ["DOJ", d.doj], ["DOR", d.dor], ["Address", d.address], ["Mobile 1", d.mobile1], ["Email", d.email], ["Branch", d.branch]];
    fields.forEach(([l, v]) => { 
        if(v){ 
            doc.text(`${l}:`, 20, y); 
            const valLines = doc.splitTextToSize(v, 110);
            doc.text(valLines, 70, y); 
            y += (valLines.length * 7); 
        } 
    });
    doc.addImage($("sig-preview").src, 'PNG', 70, y + 5, 50, 20);
    doc.save(`IBRA_${d.empId}.pdf`);
};

function sendToWhatsApp(){
    const d = getData();
    if(!d.name) return alert("Fill Name");
    const msg = `*IBRA Membership Form*\nName: ${d.name}\nEmp ID: ${d.empId}\nDOB: ${d.dob}\nAddress: ${d.address}\nMobile: ${d.mobile1}\nBranch: ${d.branch}`;
    window.open(`https://wa.me/919989036183?text=${encodeURIComponent(msg)}`, "_blank");
}

document.addEventListener("DOMContentLoaded", () => {
    setDOBLimits();
    const today = new Date();
    dob.value = formatDate(new Date(today.getFullYear()-60, today.getMonth(), today.getDate()));
    recalcFromDOB();
    dob.onchange = recalcFromDOB;
    doj.onchange = validateDates;
    dor.onchange = validateDates;
});
</script>
</body>
</html>
