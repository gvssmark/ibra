<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IBRA Membership Form</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: powderblue; padding: 6px; min-height: 100vh; }
        
        /* Non-Mobile Warning Style */
        #device-warn { display: none; background: #fff3cd; color: #856404; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ffeeba; font-size: 13px; text-align: center; }

        .header { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 12px; text-align: center; background: rgba(255,255,255,0.9); border-bottom: 1px solid #ddd; }
        .container { max-width: 520px; margin: 80px auto 20px; background: ghostwhite; border-radius: 8px; padding: 15px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }

        label { font-size: 11px; display: block; margin-top: 12px; margin-bottom: 4px; color: #333; font-weight: 600; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 2px solid #dee2e6; border-radius: 6px; font-size: 15px; background: #fff; }

        .date-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; width: 100%; }
        .date-row input { font-size: 11px; padding: 8px 2px; }

        .dob-color { background:#fff3cd !important; } .doj-color { background:#d1ecf1 !important; } .dor-color { background:#d4edda !important; }

        .upload-box { height: 120px; border: 2px dashed #ccc; border-radius: 6px; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        #photo-preview, #sig-preview { max-height: 100%; max-width: 100%; object-fit: contain; display: none; }

        .modal { position: fixed; inset: 0; background: #fff; z-index: 2001; display: none; flex-direction: column; }
        .modal-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        #canvas { flex: 1; width: 100%; height: 100%; touch-action: none; background: #fff; }
        
        .camera-container { flex: 1; position: relative; background: #000; overflow: hidden; }
        #camera-video { width: 100%; height: 100%; object-fit: cover; }
        .face-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 260px; border: 2px dashed white; border-radius: 50%; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none; }

        .btn { padding:14px; border-radius:6px; cursor:pointer; font-weight:bold; width: 100%; margin-top: 10px; border: none; }
        .btn-submit { background:#007bff; color:#fff; font-size: 18px; }
        .btn-whatsapp { background:#25D366; color:#fff; }
        .btn-capture { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; border-radius: 50%; width: 70px; height: 70px; border: 5px solid #666; }
    </style>
</head>
<body>

<div class="header"><h2 style="color:red; font-size: 20px;">IBRA Membership Form</h2></div>

<div class="container">
    <div id="device-warn">⚠️ Desktop detected: Photo & Signature are optional.</div>
    
    <form id="pensionForm">
        <label>Passport Photo</label>
        <div class="upload-box" onclick="openCamera()"><span id="photo-prompt">📷 Capture Photo</span><img id="photo-preview"></div>

        <label>Full Name *</label><input id="pensionerName" required>
        <label>Employee ID / SR No *</label>
<input id="empId" type="text"        required        inputmode="numeric"        pattern="[0-9]*"        placeholder="Digits only">
        <label>Dates (DOB | DOJ | DOR) *</label>
        <div class="date-row">
            <input type="date" id="dob" class="dob-color" required onchange="recalcFromDOB()">
            <input type="date" id="doj" class="doj-color" required>
            <input type="date" id="dor" class="dor-color" required>
        </div>

        <h3 style="margin-top:15px; font-size:13px; color:#007bff; border-bottom: 1px solid #ddd; padding-bottom:3px;">ADDRESS DETAILS</h3>
        <label>House / Flat No *</label><input id="hno" required>
        <label>Area / Landmark</label><input id="area">
        <label>Colony / Locality</label><input id="colony">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div><label>City *</label><input id="city" required></div>
            <div><label>District *</label><input id="dist" required></div>
        </div>

        <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 8px;">
            <div>
                <label>State *</label>
                <select id="state" required>
                    <option value="">Select State</option>
                    <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                    <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                    <option value="Assam">Assam</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Chandigarh">Chandigarh</option>
                    <option value="Chhattisgarh">Chhattisgarh</option>
                    <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Goa">Goa</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                    <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                    <option value="Jharkhand">Jharkhand</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Ladakh">Ladakh</option>
                    <option value="Lakshadweep">Lakshadweep</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Manipur">Manipur</option>
                    <option value="Meghalaya">Meghalaya</option>
                    <option value="Mizoram">Mizoram</option>
                    <option value="Nagaland">Nagaland</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Puducherry">Puducherry</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Sikkim">Sikkim</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Telangana">Telangana</option>
                    <option value="Tripura">Tripura</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Uttarakhand">Uttarakhand</option>
                    <option value="West Bengal">West Bengal</option>
                </select>
            </div>
            <div><label>PIN Code *</label><input id="pin" type="text"        required         maxlength="5"        inputmode="tel"        pattern="[0-9]*"        placeholder="Digits only"></div>
        </div>

        <label>Mobile 1 *</label>
<input id="mob1" type="tel"        required        maxlength="10"        inputmode="tel"        pattern="[6-9][0-9]{9}"        title="Ten digits starting with 6, 7, 8, or 9"       placeholder="Starts with 6-9">
<label>Mobile 2</label>
<input id="mob2" type="tel"        maxlength="10"        inputmode="tel"        pattern="[6-9][0-9]{9}"        title="Ten digits starting with 6, 7, 8, or 9"       placeholder="Optional (Starts with 6-9)">
        <label>Email ID *</label><input id="email" type="email" required>
        <label>Pension Branch *</label><input id="branch" required>
        <label>Spouse Name</label><input id="spouse">

        <label>Signature</label>
        <div class="upload-box" onclick="openSig()"><span id="sig-prompt">✍️ Tap to Sign</span><img id="sig-preview"></div>

        <button type="button" class="btn btn-whatsapp" onclick="sendToWhatsApp()">📱 WhatsApp All Details</button>
        <button type="submit" class="btn btn-submit">💾 Generate PDF</button>
    </form>
</div>

<div id="sig-modal" class="modal">
    <div class="modal-header"><button type="button" onclick="closeModal('sig-modal')">Cancel</button><span style="font-weight:bold">Signature</span><div><button type="button" onclick="clearCanvas()" style="color:red;margin-right:15px;border:none;background:none">Clear</button><button type="button" onclick="saveSignature()" style="background:#007bff;color:white;border:none;padding:6px 15px;border-radius:4px">Done</button></div></div>
    <canvas id="canvas"></canvas>
</div>
<div id="camera-modal" class="modal">
    <div class="modal-header"><button type="button" onclick="stopCamera()">Cancel</button><span style="font-weight:bold">Align Face</span><div style="width:40px"></div></div>
    <div class="camera-container"><video id="camera-video" autoplay playsinline></video><div class="face-overlay"></div><button type="button" class="btn-capture" onclick="takePhoto()"></button></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const canvas = $("canvas"), ctx = canvas.getContext("2d");
let drawing = false, hasSig = false, hasPhoto = false, isMobile = false;

// 1. DEVICE & REQUIREMENT CHECK
function checkDevice() {
    isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (!isMobile) {
        $("device-warn").style.display = "block";
    }
}

// 2. DATE LOGIC
function formatDate(date) { return date.toISOString().split('T')[0]; }
function recalcFromDOB() {
    if (!$("dob").value) return;
    const b = new Date($("dob").value);
    $("doj").value = formatDate(new Date(b.getFullYear() + 24, b.getMonth(), b.getDate()));
    $("dor").value = formatDate(new Date(b.getFullYear() + 60, b.getMonth() + 1, 0));
}

// 3. CAMERA & SIGNATURE (Standard logic with compression)
async function openCamera() {
    $("camera-modal").style.display = "flex";
    try { const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); $("camera-video").srcObject = s; } 
    catch(e) { alert("Camera not found or blocked."); stopCamera(); }
}
function stopCamera() { if ($("camera-video").srcObject) $("camera-video").srcObject.getTracks().forEach(t => t.stop()); $("camera-modal").style.display = "none"; }
function takePhoto() {
    const v = $("camera-video");
    const tmp = document.createElement("canvas");
    tmp.width = 300; tmp.height = 400;
    tmp.getContext("2d").drawImage(v, 0, 0, 300, 400);
    $("photo-preview").src = tmp.toDataURL("image/jpeg", 0.7);
    $("photo-preview").style.display = "block"; $("photo-prompt").style.display = "none";
    hasPhoto = true; stopCamera();
}

function openSig() { $("sig-modal").style.display = "flex"; setTimeout(resizeCanvas, 200); }
function resizeCanvas() {
    const ratio = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = "#000";
}
window.addEventListener("resize", () => { if($("sig-modal").style.display === "flex") { const d = canvas.toDataURL(); resizeCanvas(); const i = new Image(); i.onload = () => ctx.drawImage(i, 0, 0, canvas.width/devicePixelRatio, canvas.height/devicePixelRatio); i.src = d; } });
function getPos(e) { const r = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; }
canvas.addEventListener("touchstart", (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); e.preventDefault(); }, {passive:false});
canvas.addEventListener("touchmove", (e) => { if(!drawing) return; ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); e.preventDefault(); }, {passive:false});
canvas.addEventListener("touchend", () => drawing = false);
function saveSignature() { $("sig-preview").src = canvas.toDataURL("image/png"); $("sig-preview").style.display = "block"; $("sig-prompt").style.display = "none"; hasSig = true; $("sig-modal").style.display = "none"; }
function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }
function closeModal(id) { $(id).style.display = "none"; }

// 4. WHATSAPP & PDF (Comprehensive)
function sendToWhatsApp() {
    const d = {
        name: $("pensionerName").value, id: $("empId").value, dob: $("dob").value, doj: $("doj").value, dor: $("dor").value,
        hno: $("hno").value, area: $("area").value || 'NA', colony: $("colony").value || 'NA', city: $("city").value,
        dist: $("dist").value, state: $("state").value, pin: $("pin").value, mob1: $("mob1").value,
        mob2: $("mob2").value || 'NA', email: $("email").value, branch: $("branch").value, spouse: $("spouse").value || 'NA'
    };
    const msg = `*IBRA FORM SUBMISSION*\n*Name:* ${d.name}\n*ID:* ${d.id}\n*DOB/DOJ/DOR:* ${d.dob}/${d.doj}/${d.dor}\n*Address:* \n House No: ${d.hno}\n Area: ${d.area}\n Locality: ${d.colony}\n City/Town/Village: ${d.city}\n District: ${d.dist}\n State: ${d.state} - ${d.pin}\n*Mobile:* ${d.mob1} / ${d.mob2}\n*Email:* ${d.email}\n*Spouse:* ${d.spouse}\n*Branch:* ${d.branch}`;
    window.open(`https://wa.me/919989036183?text=${encodeURIComponent(msg)}`, "_blank");
}

$("pensionForm").onsubmit = (e) => {
    e.preventDefault();
    // Requirements check
    if (isMobile && (!hasPhoto || !hasSig)) return alert("Photo and Signature required on Mobile!");

    const doc = new jsPDF();
    const subDate = new Date().toLocaleDateString('en-IN');
    
    // 1. Header
    doc.setFontSize(18); 
    doc.setTextColor(220, 0, 0); 
    doc.setFontStyle("bold");
    doc.text("IBRA MEMBERSHIP FORM", 105, 15, {align:"center"});
    
    // 2. Passport Photo (Positioned to avoid text)
    // Anchored at X:155, Y:25. Size: 35x45
    if(hasPhoto) {
        doc.setDrawColor(200, 200, 200);
        doc.rect(154, 24, 37, 47); // Optional border for photo
        doc.addImage($("photo-preview").src, 'JPEG', 155, 25, 35, 45, undefined, 'FAST');
    } else {
        // Placeholder for Desktop if no photo
        doc.setDrawColor(200, 200, 200);
        doc.rect(155, 25, 35, 45);
        doc.setFontSize(8);
        doc.text("PHOTO", 172, 48, {align:"center"});
    }
    
    // 3. Submission Date
    doc.setFontSize(9); 
    doc.setTextColor(0,0,0);
    doc.setFontStyle("normal");
    doc.text(`Date of Submission: ${subDate}`, 20, 25);

    // 4. The Long Certificate Text
    // Wrapped strictly to 125mm to prevent right-margin bleed
    const certText = `To\nThe General Secretary\nIndian Bank Retirees' Association (AP & TS)\nFlat No#401, Haritasa Residency,\nD No 2-2-1121/2\nNew Nallakunta, Hyderabad 500044\n\nDear Comrade\n\nPlease enrol me as member of the Retirees' Association. I have read the Bye-laws and rules of the Association and I am willing to abide by them. I am remitting a sum of Rs.1000/- (Rupees One Thousand only) towards one time admission fee and Life Membership. Amount Credited to SB Account No 465693063 with Indian Bank, Himayatnagar Branch / Demand Draft / Cheque favouring Indian Bank Retirees' Association, AP & TS is enclosed.`;
    
    doc.setFontSize(10);
    const splitCert = doc.splitTextToSize(certText, 125); 
    doc.text(splitCert, 20, 35);

    // 5. Calculate Y position for the next section
    // Each line in splitText is ~5mm high
    let currentY = 35 + (splitCert.length * 5) + 5; 
    
    // Ensure data fields don't start until we are clear of the photo's bottom (72mm)
    if (currentY < 75) currentY = 75;

    // 6. Data Fields Mapping
    doc.setFontSize(11);
    const fields = [
        ["Name", $("pensionerName").value], 
        ["SR No/ID", $("empId").value], 
        ["Date of Birth", $("dob").value], 
        ["Date of Joining", $("doj").value], 
        ["Date of Retirement", $("dor").value],
        ["House No", $("hno").value], 
        ["Area", $("area").value], 
        ["Colony", $("colony").value], 
        ["City", $("city").value],
        ["District", $("dist").value], 
        ["State", $("state").value], 
        ["PIN Code", $("pin").value],
        ["Mobile 1", $("mob1").value], 
        ["Mobile 2", $("mob2").value], 
        ["Email ID", $("email").value], 
        ["Pension Branch", $("branch").value], 
        ["Spouse Name", $("spouse").value]
    ];

    fields.forEach(([label, val]) => { 
        if(val && val !== 'NA' && val !== ''){ 
            // Check for page overflow
            if (currentY > 280) { doc.addPage(); currentY = 20; }
            
            doc.setFontStyle("bold");
            doc.text(`${label}:`, 20, currentY);
            doc.setFontStyle("normal");
            doc.text(`${val}`, 60, currentY);
            currentY += 7; 
        } 
    });
    
    // 7. Signature Placement
    if(hasSig) { 
        if (currentY > 260) { doc.addPage(); currentY = 20; }
        currentY += 5;
        doc.setFontStyle("bold");
        doc.text("Signature:", 20, currentY + 10); 
        doc.addImage($("sig-preview").src, 'PNG', 50, currentY + 5, 55, 18, undefined, 'FAST'); 
    }

    doc.save(`IBRA_${$("empId").value}.pdf`);
};

document.addEventListener("DOMContentLoaded", () => {
    checkDevice();
    const t = new Date();
    $("dob").value = formatDate(new Date(t.getFullYear() - 60, t.getMonth(), t.getDate()));
    recalcFromDOB();
});
</script>
</body>
</html>
